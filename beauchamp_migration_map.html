  maxZoom: 19
}).addTo(map);

// ====== BUILD LAYERS ======

const overlays = {};

LINES.forEach((line, idx) => {
  const layer = L.layerGroup();
  const latlngs = line.stops.map(s => [s.lat, s.lng]);

  // The connecting path
  const path = L.polyline(latlngs, {
    color: line.color,
    weight: 3,
    opacity: 0.85,
    dashArray: line.dash || null,
    smoothFactor: 1.5
  });
  layer.addLayer(path);

  // Arrowheads on each segment via decorator-style markers
  for (let i = 0; i < latlngs.length - 1; i++) {
    const [a, b] = [latlngs[i], latlngs[i+1]];
    // Midpoint marker as a directional dot
    const mid = [(a[0]+b[0])/2, (a[1]+b[1])/2];
    const angle = Math.atan2(b[0]-a[0], b[1]-a[1]) * 180 / Math.PI;
    const arrow = L.marker(mid, {
      icon: L.divIcon({
        className: 'arrow-icon',
        html: `<div style="
          width:0;height:0;
          border-left:6px solid transparent;
          border-right:6px solid transparent;
          border-bottom:9px solid ${line.color};
          opacity:0.7;
          transform: rotate(${90 - angle}deg);
          margin-left:-6px;margin-top:-5px;
        "></div>`,
        iconSize: [12, 12]
      }),
      interactive: false
    });
    layer.addLayer(arrow);
  }

  // Dots + popups at each stop
  line.stops.forEach((s, i) => {
    const dot = L.circleMarker([s.lat, s.lng], {
      radius: 7,
      color: line.color,
      fillColor: '#f5efe2',
      fillOpacity: 0.95,
      weight: 2.5
    });
    dot.bindPopup(`
      <b>${s.place}</b>
      <div class="meta">${s.date}</div>
      <div style="margin-top:6px;">${s.people}</div>
    `, { maxWidth: 320 });
    dot.bindTooltip(s.place, { direction: 'top', offset: [0, -8] });
    layer.addLayer(dot);
  });

  overlays[line.name] = layer;
  layer.addTo(map);
});

// Layer toggle control
L.control.layers(null, overlays, { collapsed: false, position: 'topright' }).addTo(map);

    const dashCSS = line.dash ? `background-image: repeating-linear-gradient(90deg, ${line.color} 0 8px, transparent 8px 14px); background-color: transparent;` : `background-color: ${line.color};`;
    const earliest = line.stops[0].date;
    const latest = line.stops[line.stops.length - 1].date;
    html += `
      <div class="row">
        <div class="swatch" style="${dashCSS}"></div>
        <div>
          <div class="name">${line.name}</div>
          <div class="dates">${earliest} → ${latest}</div>
        </div>
      </div>`;
  });
  div.innerHTML = html;
  return div;
};
legend.addTo(map);

// Fit map to all data
const allPoints = LINES.flatMap(l => l.stops.map(s => [s.lat, s.lng]));
map.fitBounds(allPoints, { padding: [60, 60] });
</script>
